[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ai4casting"
version = "0.1.0"
description = "A deepagent-based AI agent system for casting workflows."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "deepagents",
  "langchain",
  "langchain-core",
  "langchain-openai",
  "langgraph",
  "python-dotenv",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "ruff",
]

[project.scripts]
ai4casting = "main:main"

[tool.setuptools]
py-modules = ["main"]

[tool.setuptools.packages.find]
include = ["config*", "core*", "tools*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
